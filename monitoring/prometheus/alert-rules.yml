# Phase 7: Prometheus Alert Rules
groups:
  - name: microservice_alerts
    rules:

      # High Error Rate — fires when error rate > 5% over 5 minutes
      - alert: HighErrorRate
        expr: |
          sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) by (service)
          /
          sum(rate(http_server_requests_seconds_count[5m])) by (service)
          > 0.05
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on {{ $labels.service }}"
          description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.service }}"

      # Service Down — fires when a service is unreachable
      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Prometheus cannot reach {{ $labels.job }} for more than 1 minute"

      # High Latency — P95 response time > 2 seconds
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95, 
            sum(rate(http_server_requests_seconds_bucket[5m])) by (le, service)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency on {{ $labels.service }}"
          description: "P95 latency is {{ $value }}s on {{ $labels.service }}"

      # JVM Memory High — JVM heap usage > 80%
      - alert: JvmMemoryHigh
        expr: |
          jvm_memory_used_bytes{area="heap"}
          /
          jvm_memory_max_bytes{area="heap"}
          > 0.80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "JVM heap memory high on {{ $labels.service }}"
          description: "JVM heap usage is {{ $value | humanizePercentage }} on {{ $labels.service }}"

      # Wallet Error Rate Spike
      - alert: WalletErrorSpike
        expr: rate(wallet_errors_total[5m]) > 0.1
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Wallet service error rate spike"
          description: "Wallet errors per second: {{ $value }}"

      # Transaction Error Rate Spike
      - alert: TransactionErrorSpike
        expr: rate(transaction_errors_total[5m]) > 0.1
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Transaction service error rate spike"
          description: "Transaction errors per second: {{ $value }}"
