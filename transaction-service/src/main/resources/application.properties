server.port=8092

spring.datasource.url=jdbc:mysql://localhost:3307/transaction_db
spring.datasource.username=root
spring.datasource.password=rootroot1234
spring.kafka.bootstrap-servers=localhost:9092
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
wallet.service.url=http://localhost:8091
ai.service.url=http://localhost:8095

# Redis for Shared Balance Cache
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.database=0
spring.cache.type=redis
spring.cache.redis.time-to-live=60000

jwt.secret=verysecretkeyverysecretkeyverysecretkeyverysecretkey

# ===== Phase 7: Observability =====
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId}] [traceId=%X{traceId}] %-5level %logger - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Distributed Tracing
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces

# Metrics tags
management.metrics.tags.application=transaction-service

# Phase 8: Resilience
# Resilience4j CircuitBreaker
resilience4j.circuitbreaker.instances.walletService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.walletService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.walletService.sliding-window-size=10
resilience4j.circuitbreaker.instances.walletService.permitted-number-of-calls-in-half-open-state=3

# Resilience4j Retry
resilience4j.retry.instances.walletService.max-attempts=3
resilience4j.retry.instances.walletService.wait-duration=2s
resilience4j.retry.instances.walletService.enable-exponential-backoff=true
resilience4j.retry.instances.walletService.exponential-backoff-multiplier=2

management.metrics.tags.service=transaction-service
