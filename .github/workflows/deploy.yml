name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build Backend Microservices (Maven)
      run: mvn -B package --file pom.xml -DskipTests

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and Push Docker images
      run: |
        # Backend Services
        docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-service:latest ./auth-service
        docker build -t ${{ secrets.DOCKER_USERNAME }}/wallet-service:latest ./wallet-service
        docker build -t ${{ secrets.DOCKER_USERNAME }}/transaction-service:latest ./transaction-service
        docker build -t ${{ secrets.DOCKER_USERNAME }}/notification-service:latest ./notification-service
        docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest ./api-gateway
        
        # AI Service (Python)
        docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-service:latest ./ai-service
        
        # Frontend (React/Vite)
        docker build -t ${{ secrets.DOCKER_USERNAME }}/consumer-wallet:latest ./consumer-wallet
        
        # Push to Registry
        docker push ${{ secrets.DOCKER_USERNAME }}/auth-service:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/wallet-service:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/transaction-service:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/notification-service:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/ai-service:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/consumer-wallet:latest

