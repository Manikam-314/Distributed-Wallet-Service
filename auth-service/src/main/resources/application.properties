server.port=8093

spring.datasource.url=jdbc:mysql://localhost:3307/auth_db
spring.datasource.username=root
spring.datasource.password=rootroot1234


spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

jwt.secret=verysecretkeyverysecretkeyverysecretkeyverysecretkey
jwt.expiration=3600000

# ===== Phase 7: Observability =====
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId}] [traceId=%X{traceId}] %-5level %logger - %msg%n

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Distributed Tracing
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces

# Metrics tags
management.metrics.tags.application=auth-service

# Phase 8: Resilience
# Resilience4j CircuitBreaker
resilience4j.circuitbreaker.instances.walletService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.walletService.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.walletService.sliding-window-size=10

# Resilience4j Retry
resilience4j.retry.instances.walletService.max-attempts=3
resilience4j.retry.instances.walletService.wait-duration=2s

management.metrics.tags.service=auth-service
