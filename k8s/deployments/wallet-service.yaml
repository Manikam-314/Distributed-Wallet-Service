apiVersion: apps/v1
kind: Deployment
metadata:
  name: wallet-service
  namespace: distributed-wallet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wallet-service
  template:
    metadata:
      labels:
        app: wallet-service
    spec:
      containers:
      - name: wallet-service
        image: distributed-wallet/wallet-service:latest
        ports:
        - containerPort: 8082
        envFrom:
        - configMapRef:
            name: wallet-config
        env:
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wallet-secrets
              key: MYSQL_ROOT_PASSWORD
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8082
          initialDelaySeconds: 20
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: wallet-service
  namespace: distributed-wallet
spec:
  selector:
    app: wallet-service
  ports:
  - protocol: TCP
    port: 8082
    targetPort: 8082
  type: ClusterIP
