apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: distributed-wallet
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
      - name: auth-service
        image: distributed-wallet/auth-service:latest
        ports:
        - containerPort: 9099
        envFrom:
        - configMapRef:
            name: wallet-config
        env:
        - name: MYSQL_PASSWORD
          valueFrom:
            secretKeyRef:
              name: wallet-secrets
              key: MYSQL_ROOT_PASSWORD
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "200m"
            memory: "256Mi"
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 9099
          initialDelaySeconds: 20
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /actuator/health/liveness
            port: 9099
          initialDelaySeconds: 30
          periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: distributed-wallet
spec:
  selector:
    app: auth-service
  ports:
  - protocol: TCP
    port: 9099
    targetPort: 9099
  type: ClusterIP
