server.port=8091

spring.datasource.url=jdbc:mysql://localhost:3307/wallet_db
spring.datasource.username=root
spring.datasource.password=rootroot1234
spring.kafka.bootstrap-servers=localhost:9092
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.database=0
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{correlationId}] [traceId=%X{traceId}] %-5level %logger - %msg%n

jwt.secret=verysecretkeyverysecretkeyverysecretkeyverysecretkey

# ===== Phase 7: Observability =====
# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true

# Distributed Tracing
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=http://localhost:4318/v1/traces

# Metrics tags
management.metrics.tags.application=wallet-service

# Phase 8: Resilience & Caching
# Caching Configuration
spring.cache.type=redis
spring.cache.redis.time-to-live=60000

# Resilience4j Bulkhead
resilience4j.bulkhead.instances.walletService.max-concurrent-calls=10
resilience4j.bulkhead.instances.walletService.max-wait-duration=0

# Resilience4j RateLimiter
resilience4j.ratelimiter.instances.walletService.limit-for-period=20
resilience4j.ratelimiter.instances.walletService.limit-refresh-period=1s
resilience4j.ratelimiter.instances.walletService.timeout-duration=0

# Resilience4j TimeLimiter
resilience4j.timelimiter.instances.walletService.timeout-duration=5s
resilience4j.timelimiter.instances.walletService.cancel-running-future=true

management.metrics.tags.service=wallet-service
