server:
  port: 8090

spring:
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: 
              - "http://localhost:5173"
              - "http://localhost:5174"
              - "http://localhost:5175"
              - "http://localhost:5176"
              - "http://localhost:5177"
              - "http://localhost:5178"
              - "http://localhost:5179"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            exposedHeaders:
              - "X-Correlation-ID"
      default-filters:
        - RemoveRequestHeader=Origin
      routes:
        - id: wallet-service
          uri: http://localhost:8091
          predicates:
            - Path=/api/wallet/**
          filters:
            - AuthenticationFilter
            - StripPrefix=1 

        - id: transaction-service
          uri: http://localhost:8092
          predicates:
            - Path=/api/transactions/**, /api/requests/**
          filters:
            - AuthenticationFilter
            - StripPrefix=1

        - id: auth-service
          uri: http://localhost:8093
          predicates:
            - Path=/api/auth/**
          filters:
            - AuthenticationFilter
            - StripPrefix=1

jwt:
  secret: verysecretkeyverysecretkeyverysecretkeyverysecretkey

# ===== Phase 7: Observability =====
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: api-gateway
      service: api-gateway
      