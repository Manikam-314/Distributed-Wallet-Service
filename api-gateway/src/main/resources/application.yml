server:
  port: 8080

spring:
  cloud:
    gateway:
      routes:

        - id: wallet-service
          uri: http://localhost:8081
          predicates:
            - Path=/wallet/**

        - id: transaction-service
          uri: http://localhost:8082
          predicates:
            - Path=/transactions/**

        - id: auth-service
          uri: http://localhost:8083
          predicates:
            - Path=/auth/**